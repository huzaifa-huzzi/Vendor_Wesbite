name: vendor_website
description: "SoftSnip Car Rental is a powerful system to manage vehicles, customers, bookings, pickups, drop-offs, and business operations in one modern dashboard."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  #  localization
  flutter_localizations:
    sdk: flutter

  # /// ---------- Package Starts -------- ///

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4

  # universal Packages
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  url_strategy: ^0.3.0

  #Home Screen
  file_picker: ^10.3.7
  carousel_slider: ^5.1.2

  # State Management
  get: ^4.7.3

  # /// ---------- Package Ends -------- ///

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/Images/
    - assets/Images/HomeScreen/
    - assets/Images/CarScreen/



